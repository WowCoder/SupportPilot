# LLM Configuration
# Controls the LLM provider and model settings used across the application.
#
# Provider options:
#   openai_compatible  - OpenAI Chat Completions API format (/v1/chat/completions)
#   anthropic_compatible - Anthropic Messages API format (/v1/messages)

provider: openai_compatible

openai_compatible:
  api_base: https://api.deepseek.com
  api_key_env: LLM_API_KEY
  model: deepseek-v4-flash
  timeout: 30

anthropic_compatible:
  api_base: https://api.deepseek.com/anthropic
  api_key_env: LLM_API_KEY
  model: deepseek-v4-flash
  timeout: 30
  anthropic_version: "2023-06-01"

defaults:
  temperature: 0.7
  max_tokens: 1024
