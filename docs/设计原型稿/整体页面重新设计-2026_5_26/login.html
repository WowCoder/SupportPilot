<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — SupportPilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-dot"></span>
      <h1>SupportPilot</h1>
      <p>Sign in to your account</p>
    </div>

    <form onsubmit="event.preventDefault(); window.location.href='user-dashboard.html'">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" placeholder="name@company.com" value="jane@acme.co" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-input" type="password" placeholder="Enter your password" value="password123" required>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:8px" type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>
</div>

</body>
</html>
