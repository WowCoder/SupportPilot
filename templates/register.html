{% extends "base.html" %}

{% block title %}注册 - SupportPilot{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1 class="auth-title">
            <i class="fas fa-headset"></i> SupportPilot
        </h1>
        <p class="auth-subtitle">创建您的账户，开始使用智能客服</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-user"></i> 用户名
            </label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="email">
                <i class="fas fa-envelope"></i> 邮箱
            </label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="请输入邮箱" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> 密码
            </label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="请输入密码" required minlength="8">
            <p class="form-help">密码至少需要 8 个字符，包含大小写字母和数字</p>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-user-plus"></i> 注册
        </button>
    </form>

    <div class="auth-footer">
        <p>已有账户？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    body {
        background: var(--bg-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    main {
        width: 100%;
    }
    .auth-container {
        width: 100%;
        max-width: 450px;
        margin: 0;
    }
    .btn-block {
        width: 100%;
        justify-content: center;
        padding: var(--spacing-4);
        font-size: var(--font-size-lg);
    }
</style>
{% endblock %}
