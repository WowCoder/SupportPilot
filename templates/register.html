{% extends "base.html" %}
{% block title %}Register — SupportPilot{% endblock %}

{% block body %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-dot"></span>
      <h1>SupportPilot</h1>
      <p>Create your account</p>
    </div>

    <form id="registerForm" method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" class="form-input" type="text" placeholder="Choose a username" required autofocus minlength="3" maxlength="64">
        <div class="form-error" id="usernameError"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" name="email" class="form-input" type="email" placeholder="name@company.com" required>
        <div class="form-error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" class="form-input" type="password" placeholder="Min. 8 characters" required minlength="8">
        <div class="form-error" id="passwordError"></div>
        <div class="form-hint">Must be at least 8 characters</div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" type="submit">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var form = document.getElementById('registerForm');
    var usernameInput = document.getElementById('username');
    var emailInput = document.getElementById('email');
    var passwordInput = document.getElementById('password');

    function showError(input, errorId, message) {
        var el = document.getElementById(errorId);
        if (el) el.textContent = message;
        input.classList.add('error');
    }
    function clearError(input, errorId) {
        var el = document.getElementById(errorId);
        if (el) el.textContent = '';
        input.classList.remove('error');
    }
    function validatePassword(pw) {
        if (pw.length < 8) return {valid:false, message:'Password must be at least 8 characters'};
        if (!/[A-Z]/.test(pw) || !/[a-z]/.test(pw) || !/[0-9]/.test(pw))
            return {valid:false, message:'Password must contain upper, lower letters and digits'};
        return {valid:true, message:''};
    }
    function validateEmail(em) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em); }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearError(usernameInput, 'usernameError');
        clearError(emailInput, 'emailError');
        clearError(passwordInput, 'passwordError');
        var hasError = false;

        var uname = usernameInput.value.trim();
        if (uname.length < 3 || uname.length > 64) { showError(usernameInput, 'usernameError', 'Username must be 3-64 characters'); hasError = true; }
        var email = emailInput.value.trim();
        if (!email) { showError(emailInput, 'emailError', 'Email is required'); hasError = true; }
        else if (!validateEmail(email)) { showError(emailInput, 'emailError', 'Invalid email format'); hasError = true; }
        var pw = passwordInput.value;
        if (!pw) { showError(passwordInput, 'passwordError', 'Password is required'); hasError = true; }
        else { var vr = validatePassword(pw); if (!vr.valid) { showError(passwordInput, 'passwordError', vr.message); hasError = true; } }
        if (hasError) return;

        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = 'Registering...';
        try {
            var fd = new FormData(form);
            var resp = await fetch(form.action, {
                method: 'POST',
                headers: {'X-Requested-With':'XMLHttpRequest','Content-Type':'application/x-www-form-urlencoded'},
                body: new URLSearchParams(fd).toString()
            });
            var data = await resp.json();
            if (data.success) window.location.href = data.redirect || '/login';
            else alert(data.message || 'Registration failed');
        } catch (err) { console.error(err); alert('Network error'); }
        finally { btn.disabled = false; btn.innerHTML = 'Create Account'; }
    });
    usernameInput.addEventListener('input', function(){clearError(usernameInput,'usernameError');});
    emailInput.addEventListener('input', function(){clearError(emailInput,'emailError');});
    passwordInput.addEventListener('input', function(){clearError(passwordInput,'passwordError');});
})();
</script>
{% endblock %}
