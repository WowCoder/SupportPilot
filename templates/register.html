{% extends "base.html" %}

{% block title %}注册 - SupportPilot{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1 class="auth-title">
            <i class="fas fa-headset"></i> SupportPilot
        </h1>
        <p class="auth-subtitle">创建您的账户，开始使用智能客服</p>
    </div>

    <form id="registerForm" method="POST" action="{{ url_for('auth.register') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-user"></i> 用户名
            </label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" required autofocus minlength="3" maxlength="64">
            <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-group">
            <label class="form-label" for="email">
                <i class="fas fa-envelope"></i> 邮箱
            </label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="请输入邮箱" required>
            <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> 密码
            </label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="请输入密码" required>
            <div class="form-error" id="passwordError"></div>
            <p class="form-help">密码至少需要 8 个字符，包含大小写字母和数字</p>
        </div>

        <div class="flash-messages mb-4" id="flashContainer"></div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-user-plus"></i> 注册
        </button>
    </form>

    <div class="auth-footer">
        <p>已有账户？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    body {
        background: var(--bg-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    main {
        width: 100%;
        display: flex;
        justify-content: center;
    }
    .auth-container {
        width: 100%;
        max-width: 450px;
        margin: 0;
        padding: var(--spacing-6);
    }
    .auth-header {
        text-align: center;
        margin-bottom: var(--spacing-6);
    }
    .auth-title {
        font-size: var(--font-size-2xl);
        color: var(--color-gray-800);
        margin-bottom: var(--spacing-2);
    }
    .auth-subtitle {
        color: var(--color-gray-500);
        font-size: var(--font-size-sm);
    }
    .btn-block {
        width: 100%;
        justify-content: center;
        padding: var(--spacing-4);
        font-size: var(--font-size-lg);
        margin-top: var(--spacing-4);
    }

    /* Form error styles */
    .form-error {
        color: var(--color-danger);
        font-size: var(--font-size-xs);
        min-height: 18px;
        margin-top: var(--spacing-1);
    }

    .form-input.error {
        border-color: var(--color-danger);
        background-color: var(--color-danger-bg);
    }

    .flash-messages {
        margin-bottom: var(--spacing-4);
    }

    .flash-messages:empty {
        display: none;
    }

    .flash-message {
        padding: var(--spacing-3);
        border-radius: var(--radius-md);
        margin-bottom: var(--spacing-2);
        display: flex;
        align-items: center;
        gap: var(--spacing-2);
    }

    .flash-message.danger {
        background-color: var(--color-danger-bg);
        color: var(--color-danger);
        border: 1px solid var(--color-danger);
    }

    .auth-footer {
        text-align: center;
        margin-top: var(--spacing-6);
        color: var(--color-gray-500);
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const form = document.getElementById('registerForm');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const flashContainer = document.getElementById('flashContainer');

    // Show error message for a field
    function showError(input, errorId, message) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.classList.add('visible');
        }
        input.classList.add('error');
    }

    // Clear error for a field
    function clearError(input, errorId) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.textContent = '';
            errorEl.classList.remove('visible');
        }
        input.classList.remove('error');
    }

    // Clear all errors
    function clearAllErrors() {
        clearError(usernameInput, 'usernameError');
        clearError(emailInput, 'emailError');
        clearError(passwordInput, 'passwordError');
        flashContainer.innerHTML = '';
        flashContainer.classList.remove('has-errors');
    }

    // Show flash error
    function showFlashError(message) {
        flashContainer.innerHTML = `
            <div class="flash-message danger">
                <i class="fas fa-exclamation-circle"></i>
                <div>${escapeHtml(message)}</div>
            </div>
        `;
        flashContainer.classList.add('has-errors');
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }

    // Validate password strength
    function validatePassword(password) {
        if (password.length < 8) {
            return { valid: false, message: '密码长度至少需要 8 个字符' };
        }

        const hasUppercase = /[A-Z]/.test(password);
        const hasLowercase = /[a-z]/.test(password);
        const hasDigit = /[0-9]/.test(password);

        if (!hasUppercase || !hasLowercase || !hasDigit) {
            return { valid: false, message: '密码必须包含大小写字母和数字' };
        }

        return { valid: true, message: '' };
    }

    // Validate email format
    function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearAllErrors();

        let hasError = false;

        // Validate username
        const username = usernameInput.value.trim();
        if (username.length < 3 || username.length > 64) {
            showError(usernameInput, 'usernameError', '用户名长度必须在 3-64 个字符之间');
            hasError = true;
        }

        // Validate email
        const email = emailInput.value.trim();
        if (!email) {
            showError(emailInput, 'emailError', '请输入邮箱地址');
            hasError = true;
        } else if (!validateEmail(email)) {
            showError(emailInput, 'emailError', '请输入有效的邮箱地址');
            hasError = true;
        }

        // Validate password
        const password = passwordInput.value;
        if (!password) {
            showError(passwordInput, 'passwordError', '请输入密码');
            hasError = true;
        } else {
            const pwdResult = validatePassword(password);
            if (!pwdResult.valid) {
                showError(passwordInput, 'passwordError', pwdResult.message);
                hasError = true;
            }
        }

        if (hasError) {
            return;
        }

        // Submit via AJAX
        try {
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

            const formData = new FormData(form);
            const resp = await fetch(form.action, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams(formData).toString()
            });

            const data = await resp.json();

            if (data.success) {
                // Redirect to login on success
                window.location.href = data.redirect || '/login';
            } else {
                showFlashError(data.message || '注册失败，请稍后重试');
            }
        } catch (err) {
            console.error('Registration error:', err);
            showFlashError('网络错误，请稍后重试');
        } finally {
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
        }
    });

    // Clear error on input
    usernameInput.addEventListener('input', () => clearError(usernameInput, 'usernameError'));
    emailInput.addEventListener('input', () => clearError(emailInput, 'emailError'));
    passwordInput.addEventListener('input', () => clearError(passwordInput, 'passwordError'));
})();
</script>
{% endblock %}
