{% extends "base.html" %}
{% block title %}Login — SupportPilot{% endblock %}

{% block body %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-dot"></span>
      <h1>SupportPilot</h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" class="form-input" type="text" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" class="form-input" type="password" placeholder="Enter your password" required>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
